<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Account – FleetGuard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet" />
</head>

<body>
  <div class="container py-5" style="max-width:560px;">
    <div class="form-card">
      <h4 class="mb-2"><i class="fas fa-shield-check me-2 text-success"></i>Verify Account</h4>
      <p class="text-muted small mb-4">Complete email and phone OTP verification for <strong>{{ user.name or 'User'
          }}</strong>.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Email OTP</label>
          <input type="text" name="email_otp" class="form-control" maxlength="6" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Phone OTP</label>
          <input type="text" name="phone_otp" class="form-control" maxlength="6" required />
        </div>
        <button class="btn btn-primary w-100 mb-3" type="submit">
          <i class="fas fa-check me-1"></i>Verify and Continue
        </button>
        <div class="text-center mt-2">
          <small class="text-muted">Didn't receive OTP? <a href="{{ url_for('resend_otp', user_id=user.id) }}"
              class="text-decoration-none">Resend</a></small>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
